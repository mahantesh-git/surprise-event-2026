version: '3.2'
services:
    api:
        image: ghcr.io/engineer-man/piston
        container_name: piston_api
        restart: always
        privileged: true
        ports:
            - "2000:2000"
        volumes:
            - piston_data:/piston/packages
        tmpfs:
            - /tmp:exec
        environment:
            - PISTON_RUN_TIMEOUT=30000
            - PISTON_COMPILE_TIMEOUT=60000

volumes:
    piston_data:
