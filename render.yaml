# Backend is hosted on Railway: https://quest-backend-production-7b82.up.railway.app
# Only the frontend static site is managed here.

services:
  - type: static
    name: quest-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_HOST
        value: https://quest-backend-production-7b82.up.railway.app

