services:
  - type: web
    name: quest-backend
    env: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    plan: free # or starter if you need more resources
    envVars:
      - key: PORT
        value: 4000
      # You need to provide your MongoDB URI in the Render Dashboard
      - key: MONGO_URI
        sync: false
      # You need to provide a JWT secret in the Render Dashboard
      - key: JWT_SECRET
        sync: false
      # Optional: custom admin credentials
      - key: ADMIN_EMAIL
        value: admin@admin.com
      - key: ADMIN_PASSWORD
        sync: false
      # Point to public Piston API for code execution since Docker in Render can't run Piston privileged
      - key: PISTON_API_URL
        value: https://emkc.org/api/v2/piston/execute

  - type: web
    name: quest-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # This tells the frontend to connect to the backend deployed above
      - key: VITE_API_HOST
        fromService:
          type: web
          name: quest-backend
          property: host
          # Render will automatically append /api via frontend code logic, 
          # but we can explicitly pass the full path if needed:
          # Render automatically passes the base URL like https://quest-backend.onrender.com
      # You need to provide your Gemini API key in the Render Dashboard
      - key: GEMINI_API_KEY
        sync: false
