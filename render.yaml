services:
  - type: web
    name: quest-backend
    env: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        value: admin@admin.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: PISTON_API_URL
        value: https://emkc.org/api/v2/piston/execute
      - key: NODE_ENV
        value: production
      - key: DISCORD_WEBHOOK_URL
        sync: false

  - type: static
    name: quest-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_HOST
        fromService:
          type: web
          name: quest-backend
          property: url

