<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submission – Slot 3</title>
  <style>body { display:flex; align-items:center; justify-content:center; height:100vh; margin:0; font-family:monospace; }\n.counter-box { text-align:center; }\nh1 { font-size:80px; margin:0; }\n.buttons { display:flex; gap:24px; justify-content:center; margin-top:16px; }\nbutton { width:60px; height:60px; font-size:28px; border:2px solid #333; background:transparent; border-radius:8px; cursor:pointer; }</style>
</head>
<body>
<div class="counter-box">
  <h1 id="count">0</h1>
  <div class="buttons">
    <button id="decrement">−</button>
    <button id="increment">+</button>
  </div>
</div>
<script>// Write your JavaScript here

// Get the counter element
const countEl = document.getElementById('count');

// Get the buttons
const incrementBtn = document.getElementById('increment');
const decrementBtn = document.getElementById('decrement');

// Initialize counter
let count = 0;
countEl.textContent = count;

// Increment logic
incrementBtn.addEventListener('click', () => {
    count++;
    countEl.textContent = count;
});

// Decrement logic (minimum 0)
decrementBtn.addEventListener('click', () => {
    if (count > 0) {
        count--;
        countEl.textContent = count;
    }
});
</script>
</body>
</html>
