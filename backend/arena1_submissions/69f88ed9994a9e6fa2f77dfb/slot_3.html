<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Mini Todo App</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px;
        }

        .container {
            width: 300px;
        }

        #todo-input {
            width: 70%;
            padding: 8px;
            border: none;
            outline: none;
            background: #1a1a1a;
            color: #fff;
            border-radius: 4px;
        }

        #add-btn {
            width: 25%;
            padding: 8px;
            border: none;
            background-color: #ff2d55;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
        }

        #add-btn:hover {
            opacity: 0.9;
        }

        #todo-list {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        #todo-list li {
            background: #1a1a1a;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            background: #ff2d55;
            border: none;
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .delete-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="container">
        <input id="todo-input" type="text" placeholder="Enter a todo">
        <button id="add-btn">Add</button>
        <ul id="todo-list"></ul>
    </div>

    <script>
        const input = document.getElementById('todo-input');
    const addBtn = document.getElementById('add-btn');
    const todoList = document.getElementById('todo-list');

    addBtn.addEventListener('click', () => {
      const todoText = input.value.trim();
      if (todoText !== "") {
        const li = document.createElement('li');
        li.textContent = todoText;

        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = "Delete";
        deleteBtn.className = "delete-btn";

        deleteBtn.addEventListener('click', () => {
          todoList.removeChild(li);
        });

        li.appendChild(deleteBtn);
        todoList.appendChild(li);

        input.value = "";
      }
    });
    </script>
</body>

</html>
<script>// Wire up the interactivity here
</script>
</body>
</html>
